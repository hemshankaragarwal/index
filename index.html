<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASUKI NFC</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
font-family:Arial;
background:#faf6ee;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
width:340px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
padding:30px;
text-align:center;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#B8953F;
color:white;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:15px;
}

.name{
font-size:26px;
font-weight:bold;
margin-bottom:5px;
}

.scan{
font-size:13px;
color:#777;
margin-bottom:20px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
cursor:pointer;
font-size:15px;
}

.call{background:#e8f5e9}
.wp{background:#e8f5e9}
.web{background:#e3f2fd}
.insta{background:#fce4ec}
.loc{background:#fff3e0}
.save{background:#ede7f6}

</style>
</head>

<body>

<div class="card">

<div class="avatar" id="avatar">V</div>

<div class="name" id="name">Loading...</div>

<div class="scan" id="scanText">Scans: 0</div>

<button class="btn call" onclick="callUser()">📞 Call</button>
<button class="btn wp" onclick="whatsappUser()">💬 WhatsApp</button>
<button class="btn web" onclick="openWebsite()">🌐 Website</button>
<button class="btn insta" onclick="visitInstagram()">📸 Instagram</button>
<button class="btn loc" onclick="openLocation()">📍 Location</button>
<button class="btn save" onclick="saveContact()">💾 Save Contact</button>

</div>


<script>

/* Firebase */

var firebaseConfig = {

apiKey:"AIzaSyBGHfGSGZsdiIrAUmJxPkXJmCLuAk4ctYE",

authDomain:"vasuki-nfc-d93db.firebaseapp.com",

databaseURL:"https://vasuki-nfc-d93db-default-rtdb.firebaseio.com/",

projectId:"vasuki-nfc-d93db",

storageBucket:"vasuki-nfc-d93db.appspot.com",

messagingSenderId:"159152694151",

appId:"1:159152694151:web:e5b306ac03edb60f8de922"

};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();


/* Get Card ID */

const params = new URLSearchParams(window.location.search);

let cardId = params.get("id");

if(!cardId){
cardId="101";
}


let userData={};


/* Load Data */

const ref=db.ref("cards/"+cardId);

ref.once("value").then(snapshot=>{

if(snapshot.exists()){

userData=snapshot.val();

let name=userData.name || "VASUKI";

document.getElementById("name").innerText=name;

document.getElementById("avatar").innerText=name.charAt(0).toUpperCase();

document.getElementById("scanText").innerText="Scans: "+(userData.scans || 0);

ref.update({
scans:(userData.scans || 0)+1
});

}else{

document.getElementById("name").innerText="No Data Found";

}

});


/* Actions */

function callUser(){

if(userData.phone){

location.href="tel:"+userData.phone;

}

}

function whatsappUser(){

if(userData.phone){

let phone=userData.phone.replace(/\D/g,'');

window.open("https://wa.me/"+phone);

}

}

function visitInstagram(){

if(userData.instagram){

window.open("https://instagram.com/"+userData.instagram);

}

}

function openWebsite(){

let site=userData.website || "";

if(site && !site.startsWith("http")){

site="https://"+site;

}

window.open(site);

}

function openLocation(){

if(userData.location){

window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(userData.location));

}

}


function saveContact(){

if(!userData.phone) return;

const vcard=
`BEGIN:VCARD
VERSION:3.0
FN:${userData.name}
TEL:${userData.phone}
URL:${userData.website || ""}
END:VCARD`;

const blob=new Blob([vcard],{type:"text/vcard"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="contact.vcf";

a.click();

}

</script>

</body>
</html>
