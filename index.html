<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASUKI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

/* 🌌 PREMIUM ANIMATED BACKGROUND */
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
    position:relative;
    background:#000;
}

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle at 30% 30%, #ffd70022, transparent 40%),
        radial-gradient(circle at 70% 70%, #9333ea33, transparent 40%),
        radial-gradient(circle at 50% 80%, #3b82f622, transparent 40%);
    animation:moveLight 18s linear infinite alternate;
}

@keyframes moveLight{
    0%{transform:translate(-10%,-10%)}
    100%{transform:translate(10%,10%)}
}

/* 💎 GLASS CARD */
.container{
    width:95%;
    max-width:380px;
    padding:36px 25px;
    border-radius:28px;
    background:rgba(20,20,20,0.65);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    text-align:center;
    position:relative;
    box-shadow:0 25px 60px rgba(0,0,0,0.8);
    border:1px solid rgba(255,215,0,0.3);
}

/* LOGO */
.logo{
    width:130px;
    margin:auto;
    display:block;
    filter:drop-shadow(0 0 12px rgba(255,215,0,.6));
}

/* TITLE */
h2{
    margin:20px 0 28px;
    letter-spacing:4px;
    font-weight:700;
    color:#ffd700;
}

/* BUTTON */
.btn{
    display:block;
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:14px;
    font-size:16px;
    font-weight:600;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{ transform:translateY(-4px); }
.btn:active{ transform:scale(.97); }

/* BUTTON COLORS */
.call{background:linear-gradient(135deg,#16a34a,#065f46);}
.whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);}
.location{background:linear-gradient(135deg,#2563eb,#1e3a8a);}
.website{background:linear-gradient(135deg,#9333ea,#5b21b6);}
.save{background:linear-gradient(135deg,#ffd700,#b8860b);color:#000;}

</style>
</head>

<body>

<div class="container">

<img src="https://i.ibb.co/Xfjzjy1z/logo.png" class="logo" alt="VASUKI Logo">
<h2>VASUKI</h2>

<button class="btn call" onclick="callNow()">📞 Call Now</button>
<button class="btn whatsapp" onclick="openWhatsApp()">💬 WhatsApp</button>
<button class="btn location" onclick="openLocation()">📍 Location</button>
<button class="btn website" onclick="openWebsite()">🌐 Website</button>
<button class="btn save" onclick="saveContact()">⭐ Save Contact</button>

</div>

<script>

/* 📞 CALL */
function callNow(){
    window.location.href="tel:+916377393721";
}

/* 💬 WHATSAPP (NORMAL + BUSINESS BOTH) */
function openWhatsApp(){
    const phone = "916377393721";
    const message = "Hello VASUKI";

    const url = `https://api.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");
}

/* 📍 EXACT LOCATION */
function openLocation(){
    window.open("https://www.google.com/maps?q=26.878861,75.872833","_blank");
}

/* 🌐 WEBSITE */
function openWebsite(){
    window.open("https://yourwebsite.com","_blank");
}

/* ⭐ SAVE CONTACT */
function saveContact(){
const vcard=`BEGIN:VCARD
VERSION:3.0
FN:VASUKI
TEL:+916377393721
END:VCARD`;

const blob=new Blob([vcard],{type:"text/vcard"});
const url=window.URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="VASUKI.vcf";
a.click();
}

</script>

</body>
</html>
