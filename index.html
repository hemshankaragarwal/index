<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASUKI NFC</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#FDFAF4;
font-family:'DM Sans',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* CARD */

.card{
max-width:420px;
width:100%;
background:white;
border-radius:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
overflow:hidden;
}

.header{
text-align:center;
padding:35px 25px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:#F5EDD8;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
margin:auto;
color:#B8953F;
font-weight:bold;
}

.name{
font-family:'Cormorant Garamond',serif;
font-size:28px;
margin-top:15px;
}

.title{
font-size:12px;
letter-spacing:2px;
color:#777;
margin-top:4px;
}

.buttons{
padding:20px;
display:grid;
gap:10px;
}

.btn{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:12px;
border:1px solid #eee;
background:white;
cursor:pointer;
font-size:14px;
}

.btn:hover{
background:#fafafa;
}

.footer{
text-align:center;
padding:15px;
font-size:11px;
color:#777;
}

</style>
</head>

<body>

<div class="card">

<div class="header">

<div class="avatar" id="avatarInitial">V</div>

<div class="name" id="name">VASUKI NFC</div>

<div class="title">Digital Business Card</div>

</div>

<div class="buttons">

<button class="btn" onclick="callUser()">📞 Call</button>

<button class="btn" onclick="whatsappUser()">💬 WhatsApp</button>

<button class="btn" onclick="openWebsite()">🌐 Website</button>

<button class="btn" onclick="visitInstagram()">📸 Instagram</button>

<button class="btn" onclick="openLocation()">📍 Location</button>

<button class="btn" onclick="saveContact()">💾 Save Contact</button>

</div>

<div class="footer">
Powered by <b>VASUKI NFC</b>
</div>

</div>

<script>

/* ===== YOUR DETAILS ===== */

let userData = {

name:"Hem Shankar Agarwal",

phone:"9999999999",

instagram:"vasukinfc",

website:"https://vasukinfc.com",

location:"Jaipur Rajasthan"

};

/* LOAD NAME */

document.getElementById("name").innerText=userData.name;

document.getElementById("avatarInitial").innerText=userData.name.charAt(0);

/* ACTIONS */

function callUser(){

location.href="tel:"+userData.phone;

}

function whatsappUser(){

window.open("https://wa.me/"+userData.phone);

}

function openWebsite(){

window.open(userData.website);

}

function visitInstagram(){

window.open("https://instagram.com/"+userData.instagram);

}

function openLocation(){

window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(userData.location));

}

function saveContact(){

const vcard=`BEGIN:VCARD
VERSION:3.0
FN:${userData.name}
TEL:${userData.phone}
URL:${userData.website}
END:VCARD`;

const blob=new Blob([vcard],{type:"text/vcard"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="contact.vcf";

a.click();

}

</script>

</body>
</html>
