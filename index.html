<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NFC Card</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
width:320px;
padding:30px;
border-radius:12px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.photo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
background:#ddd;
}

h2{
margin:10px 0;
}

a{
display:block;
margin-top:10px;
color:#0066ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<img id="photo" class="photo">

<h2 id="name"></h2>

<p id="phone"></p>

<a id="instagram" target="_blank"></a>

<a id="website" target="_blank"></a>

<p id="location"></p>

</div>

<script>

const cards = {

101:{
name:"hemshankar",
phone:"+916377393721",
instagram:"qwdwx",
website:"https://google.com",
location:"",
photo:"https://i.imgur.com/4Z7b6KQ.png"
},

102:{
name:"test mode",
phone:"999999999",
instagram:"test_99",
website:"https://chatgpt.com",
location:"26°52'43.9N 75°52'22.2E",
photo:"https://i.imgur.com/4Z7b6KQ.png"
}

};


const params = new URLSearchParams(window.location.search);
let id = params.get("id");

if(!id){
id="101";
}

const card = cards[id];

if(card){

document.getElementById("name").innerText = card.name || "";

document.getElementById("phone").innerText = card.phone || "";

document.getElementById("location").innerText = card.location || "";

if(card.photo){
document.getElementById("photo").src = card.photo;
}

if(card.instagram){
document.getElementById("instagram").href="https://instagram.com/"+card.instagram;
document.getElementById("instagram").innerText="Instagram";
}

if(card.website){
document.getElementById("website").href=card.website;
document.getElementById("website").innerText="Website";
}

}

</script>

</body>
</html>
